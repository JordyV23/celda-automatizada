version: '3.8'

services:
  # 1. Controlador Lógico Programable (Simulador del S7-1500)
  openplc:
    image: tuttas/openplc_v3
    container_name: openplc_runtime
    ports:
      - "8080:8080" # Interfaz Web
      - "502:502"   # Modbus TCP
    restart: unless-stopped

  # 2. Broker MQTT (Bus de Mensajería)
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mosquitto_broker
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
    restart: unless-stopped

  # 3. Base de Datos de Series Temporales (Métricas y OEE)
  influxdb:
    image: influxdb:2.7
    container_name: influxdb_metrics
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=adminpassword
      - DOCKER_INFLUXDB_INIT_ORG=celda_org
      - DOCKER_INFLUXDB_INIT_BUCKET=binning_data
    restart: unless-stopped

  # 4. HMI y Visualización
  grafana:
    image: grafana/grafana:latest
    container_name: grafana_dashboard
    ports:
      - "3000:3000"
    depends_on:
      - influxdb
    restart: unless-stopped

  # 5. Nuestro Script Integrador (Puente ZMQ-Modbus)
  python-gateway:
    build: ./python-gateway
    container_name: python_gateway
    extra_hosts:
      - "host.docker.internal:host-gateway" # Crucial para conectar con CoppeliaSim en Windows
    depends_on:
      - openplc
      - mosquitto
    restart: always